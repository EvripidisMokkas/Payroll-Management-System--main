[tool.ruff]
target-version = "py313"
line-length = 120
exclude = ["**/migrations/*.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.coverage.run]
source = ["apps", "payroll_platform"]
omit = ["*/migrations/*", "*/settings/*", "*/wsgi.py", "*/asgi.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 75

[tool.mypy]
python_version = "3.13"
check_untyped_defs = true
ignore_missing_imports = true
follow_imports = "skip"
warn_unused_ignores = true
exclude = [".*/migrations/.*"]
