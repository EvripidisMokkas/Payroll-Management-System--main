{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Payroll Platform{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block shell %}
  <header class="topbar">
    <a class="brand" href="{% url 'home' %}">
      <span class="brand-mark">P</span>
      <span>Payflow</span>
    </a>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="/admin/">Admin</a>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="nav-button" type="submit">Sign out</button></form>
      {% else %}
        <a href="/api/docs/">API docs</a>
        <a class="button button-small" href="{% url 'login' %}">Sign in</a>
      {% endif %}
    </nav>
  </header>
  <main class="page-content">{% block content %}{% endblock %}</main>
  {% endblock %}
</body>
</html>
